repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.2
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: mypy-backend
        name: mypy (backend via uv)
        entry: uv run --directory backend mypy
        language: system
        pass_filenames: false
        files: ^backend/
        env:
          DJANGO_SETTINGS_MODULE: config.settings.test
          SECRET_KEY: pre-commit-mypy-dummy # pragma: allowlist secret
          DB_NAME: test
          DB_USER: test
          DB_PASSWORD: test # pragma: allowlist secret
          CLOUDINARY_CLOUD_NAME: test # pragma: allowlist secret
          CLOUDINARY_API_KEY: test # pragma: allowlist secret
          CLOUDINARY_API_SECRET: test # pragma: allowlist secret
          STRIPE_SECRET_KEY: sk_test_precommit_dummy # pragma: allowlist secret
          STRIPE_WEBHOOK_SECRET: whsec_precommit_dummy # pragma: allowlist secret
          RESEND_API_KEY: re_precommit_dummy # pragma: allowlist secret
          GOOGLE_CLIENT_ID: precommit-dummy.apps.googleusercontent.com
          GOOGLE_CLIENT_SECRET: precommit-google-dummy # pragma: allowlist secret
          GOOGLE_CALLBACK_URL: http://localhost:3000/auth/callback

  - repo: https://github.com/PyCQA/bandit
    rev: 1.9.1
    hooks:
      - id: bandit
        args: ["-c", "backend/pyproject.toml", "-r", "backend/apps/"]

  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ["--baseline", ".secrets.baseline"]

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: check-yaml
      - id: check-json
      - id: debug-statements
